<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Leads | R Swathi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <h1 class="brand">Leads Dashboard</h1>
      <nav class="nav-links">
        <a href="/index.html">Back to Portfolio</a>
      </nav>
    </div>
  </header>

  <main class="section container">
    <h2>Contact Inquiries</h2>
    <p class="muted">Latest 100 leads captured from your portfolio form.</p>

    <div class="admin-controls">
      <input type="password" id="adminToken" placeholder="Optional admin token">
      <button id="loadLeads">Load Leads</button>
    </div>

    <p id="adminStatus" class="form-status" aria-live="polite"></p>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Message</th>
            <th>Received</th>
          </tr>
        </thead>
        <tbody id="leadsTableBody"></tbody>
      </table>
    </div>
  </main>

  <script src="admin.js"></script>
</body>
</html>
